<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f0e0d;
            --paper: #f5f2ed;
            --accent: #d4522a;
            --accent2: #2a6dd4;
            --accent3: #2ab87a;
            --muted: #8a8580;
            --card-bg: #ffffff;
            --border: #e0dbd3;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: var(--ink);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--paper);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links { display: flex; gap: 0.25rem; }

        .nav-links a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* MAIN */
        main { padding: 3rem 2.5rem; max-width: 1200px; margin: 0 auto; }

        /* CARDS */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }

        /* PAGE HEADER */
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
        .page-header p { color: var(--muted); margin-top: 0.5rem; font-size: 1rem; }

        /* BADGE */
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            background: var(--ink);
            color: var(--paper);
        }
        .badge.orange { background: #fff0eb; color: var(--accent); }
        .badge.blue   { background: #ebf1ff; color: var(--accent2); }
        .badge.green  { background: #ebfff5; color: var(--accent3); }

        /* BACK LINK */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--ink); }

        /* COURSE LOGO */
        .course-logo {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            object-fit: contain;
            background: #f0f0f0;
            padding: 4px;
        }

        .course-logo-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent2), var(--accent3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
        .card-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.15rem; }

        .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700;
            color: var(--paper); font-size: 1rem;
            flex-shrink: 0;
        }

        .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
        .tag {
            font-size: 0.78rem;
            padding: 0.25rem 0.6rem;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--ink);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .empty-state p { font-size: 0.95rem; margin-top: 0.5rem; }

        /* Detail page layout */
        .detail-hero {
            background: var(--ink);
            color: var(--paper);
            border-radius: 18px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .detail-hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        .detail-hero h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }
        .detail-hero .meta { color: #999; font-size: 0.875rem; margin-top: 0.4rem; }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">School<span>.</span></a>
        <div class="nav-links">
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
            <a href="/instructors/" {% if '/instructors' in request.path %}class="active"{% endif %}>Instructors</a>
            <a href="/students/" {% if '/students' in request.path %}class="active"{% endif %}>Students</a>
            <a href="/courses/" {% if '/courses' in request.path %}class="active"{% endif %}>Courses</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
